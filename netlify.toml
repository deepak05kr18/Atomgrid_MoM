[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Allow microphone access on deployed site
[[headers]]
  for = "/*.html"
  [headers.values]
    Permissions-Policy = "microphone=(*)"